# Firewall  ================================================
- name: Allow K3s API
  ufw:
    rule: allow
    port: "6443"
    proto: tcp
 
- name: Allow Airflow NodePort
  ufw:
    rule: allow
    port: "32080"
    proto: tcp

- name: Allow api-prod NodePort
  ufw:
    rule: allow
    port: "32081"
    proto: tcp

- name: Allow api-predict NodePort
  ufw:
    rule: allow
    port: "32001"
    proto: tcp
 
# K3s installation  ================================================
- name: Check if K3s is already installed
  stat:
    path: /usr/local/bin/k3s
  register: k3s_binary
 
- name: Install K3s
  shell: curl -sfL https://get.k3s.io | sh -
  when: not k3s_binary.stat.exists
 
- name: Wait for K3s to be ready
  wait_for:
    path: /etc/rancher/k3s/k3s.yaml
    timeout: 60
 
# Kubeconfig  ================================================
- name: Create .kube directory for ubuntu user
  file:
    path: /home/ubuntu/.kube
    state: directory
    owner: ubuntu
    group: ubuntu
    mode: "0755"
 
- name: Copy kubeconfig for ubuntu user
  copy:
    src: /etc/rancher/k3s/k3s.yaml
    dest: /home/ubuntu/.kube/config
    owner: ubuntu
    group: ubuntu
    mode: "0600"
    remote_src: yes
 
- name: Enable and start K3s service
  service:
    name: k3s
    enabled: yes
    state: started
