# System update  ================================================
- name: Update apt packages
  apt:
    update_cache: yes
    upgrade: dist
    cache_valid_time: 10800

# Essential tools  ================================================
- name: Install essential tools
  apt:
    name:
      - curl
      - wget
      - git
      - unzip
      - ca-certificates
      - gnupg
      - lsb-release
      - python3
      - python3-pip
      - ufw
    state: present

# Firewall  ================================================
- name: Allow SSH
  ufw:
    rule: allow
    port: "22"
    proto: tcp

- name: Enable UFW
  ufw:
    state: enabled
    policy: deny

# SSH hardening  ================================================
- name: Disable password authentication
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "^PasswordAuthentication"
    line: "PasswordAuthentication no"
    state: present
  notify: Restart SSH

- name: Disable root login
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "^PermitRootLogin"
    line: "PermitRootLogin no"
    state: present
  notify: Restart SSH
