# Installation GitLab Runner  ================================================
- name: Check if GitLab Runner is already installed
  stat:
    path: /usr/bin/gitlab-runner
  register: gitlab_runner_binary

- name: Add GitLab Runner repository
  deb822_repository:
    name: gitlab-runner
    types: deb
    uris: https://packages.gitlab.com/runner/gitlab-runner/ubuntu/
    suites: "{{ ansible_distribution_release }}"
    components: main
    signed_by: https://packages.gitlab.com/runner/gitlab-runner/gpgkey
    state: present
  when: not gitlab_runner_binary.stat.exists

- name: Install GitLab Runner
  apt:
    name: gitlab-runner
    state: present
    update_cache: yes
  when: not gitlab_runner_binary.stat.exists

- name: Enable and start GitLab Runner service
  service:
    name: gitlab-runner
    enabled: yes
    state: started

# Registration  ================================================
- name: Check if runner is already registered
  command: gitlab-runner list
  register: runner_list
  changed_when: false

- name: Register GitLab Runner
  command: >
    gitlab-runner register
    --non-interactive
    --url "{{ gitlab_url }}"
    --token "{{ gitlab_runner_token }}"
    --executor "{{ gitlab_runner_executor }}"
    {% if gitlab_runner_executor == 'docker' %}
    --docker-image "{{ gitlab_runner_docker_image }}"
    --docker-volumes /var/run/docker.sock:/var/run/docker.sock
    {% endif %}
  when: gitlab_runner_name not in runner_list.stdout
  

# Installation kubectl  ================================================
- name: Check if kubectl is already installed
  stat:
    path: /usr/local/bin/kubectl
  register: kubectl_binary

- name: Install kubectl
  shell: |
    curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
    install -o root -g root -m 0755 kubectl /usr/local/bin/kubectl
    rm kubectl
  when:
    - not kubectl_binary.stat.exists
    - gitlab_runner_executor == 'shell'


# Installation helm  ================================================
- name: Check if helm is already installed
  stat:
    path: /usr/local/bin/helm
  register: helm_binary

- name: Install helm
  shell: curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
  when:
    - not helm_binary.stat.exists
    - gitlab_runner_executor == 'shell'